services:
  mcp-forms-server:
    build: .
    container_name: 1c-mcp-forms-server
    ports:
      - "8011:8011"
    volumes:
      - ./databases:/databases
    environment:
      - PORT=8011
      - TRANSPORT=streamable-http
      - EDT_ENABLED=${EDT_ENABLED:-true}
      - EDT_MCP_URL=${EDT_MCP_URL:-http://host.docker.internal:9999/sse}
      - EDT_TIMEOUT=${EDT_TIMEOUT:-10}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
